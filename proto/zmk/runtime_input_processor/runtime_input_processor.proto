syntax = "proto3";

package zmk.runtime_input_processor;

// Information about a single input processor
message ProcessorInfo {
    // Processor ID (index in array)
    uint32 id = 1;
    // Processor name (max 16 characters, short for BLE efficiency)
    string name = 2;
    // Current scale multiplier (for speed adjustment)
    uint32 scale_multiplier = 3;
    // Current scale divisor (for speed adjustment)
    uint32 scale_divisor = 4;
    // Current rotation in degrees
    int32 rotation_degrees = 5;
    // Temporary layer settings
    bool temp_layer_enabled = 6;
    uint32 temp_layer_layer = 7;
    uint32 temp_layer_activation_delay_ms = 8;
    uint32 temp_layer_deactivation_delay_ms = 9;
    // Active layers bitmask (0 = all layers)
    uint32 active_layers = 10;
}

// Information about a keyboard layer
message LayerInfo {
    // Layer ID (index)
    uint32 id = 1;
    // Layer display name
    string name = 2;
}

// Request to list all available input processors
message ListProcessorsRequest {}

message ListProcessorsResponse {}

// Request to get settings for a specific processor
message GetProcessorRequest {
    uint32 id = 1;
}

message GetProcessorResponse {
    ProcessorInfo processor = 1;
}

// Request to update scale multiplier
message SetScaleMultiplierRequest {
    uint32 id = 1;
    uint32 value = 2;
}

message SetScaleMultiplierResponse {}

// Request to update scale divisor
message SetScaleDivisorRequest {
    uint32 id = 1;
    uint32 value = 2;
}

message SetScaleDivisorResponse {}

// Request to update rotation settings
message SetRotationRequest {
    uint32 id = 1;
    int32 value = 2;
}

message SetRotationResponse {}

// Request to reset input processor
message ResetProcessorRequest {
    uint32 id = 1;
}

message ResetProcessorResponse {}

// Request to set temp layer enabled
message SetTempLayerEnabledRequest {
    uint32 id = 1;
    bool enabled = 2;
}

message SetTempLayerEnabledResponse {}

// Request to set temp layer layer
message SetTempLayerLayerRequest {
    uint32 id = 1;
    uint32 layer = 2;
}

message SetTempLayerLayerResponse {}

// Request to set temp layer activation delay
message SetTempLayerActivationDelayRequest {
    uint32 id = 1;
    uint32 activation_delay_ms = 2;
}

message SetTempLayerActivationDelayResponse {}

// Request to set temp layer deactivation delay
message SetTempLayerDeactivationDelayRequest {
    uint32 id = 1;
    uint32 deactivation_delay_ms = 2;
}

message SetTempLayerDeactivationDelayResponse {}

// Request to set active layers for a processor
message SetActiveLayersRequest {
    uint32 id = 1;
    uint32 layers = 2;  // Bitmask of layers where processor is active (0 = all)
}

message SetActiveLayersResponse {}

// Request to get layer information
message GetLayerInfoRequest {}

message GetLayerInfoResponse {
    repeated LayerInfo layers = 1;
}

// Main request message
message Request {
    oneof request_type {
        ListProcessorsRequest list_processors = 1;
        GetProcessorRequest get_processor = 2;
        SetScaleMultiplierRequest set_scale_multiplier = 3;
        SetScaleDivisorRequest set_scale_divisor = 4;
        SetRotationRequest set_rotation = 5;
        ResetProcessorRequest reset_processor = 6;
        SetTempLayerEnabledRequest set_temp_layer_enabled = 7;
        SetTempLayerLayerRequest set_temp_layer_layer = 8;
        SetTempLayerActivationDelayRequest set_temp_layer_activation_delay = 9;
        SetTempLayerDeactivationDelayRequest set_temp_layer_deactivation_delay = 10;
        SetActiveLayersRequest set_active_layers = 11;
        GetLayerInfoRequest get_layer_info = 12;
    }
}

// Error response
message ErrorResponse {
    string message = 1;
}

// Main response message
message Response {
    oneof response_type {
        ErrorResponse error = 1;
        ListProcessorsResponse list_processors = 2;
        GetProcessorResponse get_processor = 3;
        SetScaleMultiplierResponse set_scale_multiplier = 4;
        SetScaleDivisorResponse set_scale_divisor = 5;
        SetRotationResponse set_rotation = 6;
        ResetProcessorResponse reset_processor = 7;
        SetTempLayerEnabledResponse set_temp_layer_enabled = 8;
        SetTempLayerLayerResponse set_temp_layer_layer = 9;
        SetTempLayerActivationDelayResponse set_temp_layer_activation_delay = 10;
        SetTempLayerDeactivationDelayResponse set_temp_layer_deactivation_delay = 11;
        SetActiveLayersResponse set_active_layers = 12;
        GetLayerInfoResponse get_layer_info = 13;
    }
}

// Notification when processor settings change
message ProcessorChangedNotification {
    ProcessorInfo processor = 1;
}

// Notification wrapper
message Notification {
    oneof notification_type {
        ProcessorChangedNotification processor_changed = 1;
    }
}
