syntax = "proto3";

package cormoran.zmk.physical_layouts;

message GetPhysicalLayoutRequest {}

message PointSizePhysicalAttrs {
    int32 x    = 1;
    int32 y    = 2;
    int32 size = 3;
}

message RectPhysicalAttrs {
    int32 width  = 1;
    int32 height = 2;
    int32 x      = 3;
    int32 y      = 4;
    int32 r      = 5;
    int32 rx     = 6;
    int32 ry     = 7;
}

message LinkedDevice {
    string device_identifier    = 1;
    string subsystem_identifier = 2;
}

message Trackball {
    PointSizePhysicalAttrs attrs = 1;
}

message RotaryEncoder {
    bool enabled                 = 1;
    PointSizePhysicalAttrs attrs = 2;
}

message TouchPad {
    RectPhysicalAttrs attrs = 1;
}

message CustomModule {
    string type             = 1;
    RectPhysicalAttrs attrs = 2;
}

message PhysicalDevice {
    string identifier       = 1;
    string display_name     = 2;
    repeated LinkedDevice links = 3;
    bool enabled            = 8;

    oneof device_type {
        Trackball trackball       = 4;
        TouchPad touch_pad        = 6;
        CustomModule custom_module = 7;
    }
}

message GetPhysicalLayoutResponse {
    repeated PhysicalDevice devices       = 1;
    repeated RotaryEncoder rotary_encoders = 2;
}

message Request {
    oneof request_type {
        GetPhysicalLayoutRequest get_physical_layout = 1;
    }
}

message ErrorResponse {
    string message = 1;
}

message Response {
    oneof response_type {
        ErrorResponse error                         = 1;
        GetPhysicalLayoutResponse physical_layout   = 2;
    }
}
