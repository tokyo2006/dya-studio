syntax = "proto3";

package cormoran.runtime_combo;

message BehaviorBinding {
    uint32 behavior_id = 1;
    uint32 param1 = 2;
    uint32 param2 = 3;
}

message Combo {
    uint32 index = 1;
    string name = 2;
    repeated uint32 key_positions = 3;
    BehaviorBinding behavior = 4;
    uint32 layer_mask = 6;
    bool enabled = 8;
}

message GlobalSettings {
    uint32 timeout_ms = 1;
    bool slow_release = 2;
    uint32 max_combo = 3;
}

message ListCombosRequest {}

message GetComboRequest { uint32 index = 1; }

message SetComboRequest {
    uint32 index = 1;
    repeated uint32 key_positions = 2;
    BehaviorBinding behavior = 3;
    uint32 layer_mask = 5;
    bool enabled = 7;
    bool persist = 8;
}

message SetComboNameRequest {
    uint32 index = 1;
    string name = 2;
    bool persist = 3;
}

message DeleteComboRequest {
    uint32 index = 1;
    bool persist = 2;
}

message GetGlobalSettingsRequest {}

message SetTimeoutMsRequest {
    uint32 timeout_ms = 1;
    bool persist = 2;
}

message SetSlowReleaseRequest {
    bool slow_release = 1;
    bool persist = 2;
}

message SaveRequest {}

message DiscardRequest {}

message Request {
    oneof request_type {
        ListCombosRequest list_combos = 1;
        GetComboRequest get_combo = 2;
        SetComboRequest set_combo = 3;
        SetComboNameRequest set_combo_name = 4;
        DeleteComboRequest delete_combo = 5;
        GetGlobalSettingsRequest get_global_settings = 6;
        SetTimeoutMsRequest set_timeout_ms = 7;
        SetSlowReleaseRequest set_slow_release = 8;
        SaveRequest save = 9;
        DiscardRequest discard = 10;
    }
}

message ListCombosResponse { repeated Combo combos = 1; }

message GetComboResponse { Combo combo = 1; }

message GetGlobalSettingsResponse { GlobalSettings settings = 1; }

message StatusResponse {
    uint32 affected_count = 1;
    string message = 2;
}

message ErrorResponse { string message = 1; }

message Response {
    oneof response_type {
        ErrorResponse error = 1;
        ListCombosResponse list_combos = 2;
        GetComboResponse get_combo = 3;
        StatusResponse status = 4;
        GetGlobalSettingsResponse get_global_settings = 5;
    }
}
