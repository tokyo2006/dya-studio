syntax = "proto3";

package cormoran.fast_keymap;

// A read-only, fast-loading alternative to ZMK's official `zmk.keymap` /
// `zmk.behaviors` Studio subsystems. See DESIGN.md for the full rationale.
//
// Vendored from cormoran/zmk-feature-fast-keymap
// (proto/cormoran/fast-keymap/fast_keymap.proto) so dya-studio can talk to the
// `cormoran__fast_keymap` custom Studio RPC subsystem when a keyboard exposes
// it, falling back to the official protocol otherwise. Kept in sync with
// upstream (currently reflects PR #2: 16-bit / adaptive-width fingerprints,
// batched get_layers, physical-layout size hoist, opt-in alias/display_name;
// plus PR #4: get_pending unsaved-positions method).
//
// Message shapes deliberately mimic the official proto
// (dependencies/modules/msgs/zmk-studio-messages/proto/zmk/{keymap,behaviors}.proto)
// -- no bespoke byte packing, no app-level response chunking. `repeated` and
// `string` fields are left WITHOUT `max_size`/`max_count` on purpose so
// nanopb generates callback (streaming) field types; see DESIGN.md SS3.

message Request {
    oneof request_type {
        bool get_snapshot = 1;
        ListBehaviorsRequest list_behaviors = 2;
        GetBehaviorsRequest get_behaviors = 3;              // batch details (miss-repair)
        GetLayerRequest get_layer = 4;                      // current/effective
        GetLayerRequest get_default_layer = 5;              // DT stock default
        GetLayerRequest get_edited_layer = 6;               // diff current vs default
        GetPhysicalLayoutsRequest get_physical_layouts = 7; // slim summary (+ optional geometry)
        GetPhysicalLayoutRequest get_physical_layout = 8;   // one layout's geometry
        GetLayersRequest get_layers = 9;                    // batch current/effective (cold load)
        bool get_pending = 10;                              // all layers' unsaved (pending) positions
    }
}

message Response {
    oneof response_type {
        ErrorResponse error = 1;
        Snapshot snapshot = 2;
        ListBehaviorsResponse list_behaviors = 3;
        GetBehaviorsResponse get_behaviors = 4;
        Layer get_layer = 5;
        Layer get_default_layer = 6;
        EditedLayer get_edited_layer = 7;
        PhysicalLayoutsResponse get_physical_layouts = 8;
        PhysicalLayoutResponse get_physical_layout = 9;
        GetLayersResponse get_layers = 10;
        PendingResponse get_pending = 11;
    }
}

message GetLayerRequest { uint32 layer_id = 1; }

// Batch fetch of several layers' current/effective bindings in one round-trip
// (DESIGN.md SS7). On a cold load a client wants every layer at once, and one
// get_layer per layer is more round-trips than the whole keymap needs -- this
// collapses them. Unknown/invalid ids are skipped (like get_behaviors), not an
// error. `layer_ids` is bounded (max_count:32, fits the RX buffer); chunk more.
message GetLayersRequest {
    repeated uint32 layer_ids = 1;
}

message GetLayersResponse { repeated Layer layers = 1; }

enum ErrorCode {
    ERR_GENERIC = 0;
    ERR_INVALID_LAYER = 1;
    ERR_INVALID_BEHAVIOR = 2;
    ERR_INVALID_LAYOUT = 3;
}

message ErrorResponse { ErrorCode code = 1; }

// Cheap cache keys for every data group this subsystem serves, so a client
// with a warm cache can skip re-fetching groups whose fingerprint matches.
// See DESIGN.md SS4 for the exact canonicalization each fingerprint hashes.
message Snapshot {
    uint32 definition_version = 1;
    uint32 behaviors_fp = 2;
    uint32 default_keymap_fp = 3;
    uint32 keymap_fp = 4;
    uint32 physical_layout_fp = 5;
    uint32 behavior_count = 6;
    uint32 max_layer_name_length = 7;
    uint32 available_layers = 8;
    uint32 active_layout_index = 9;
    repeated LayerFingerprint layers = 10;
    // Width (bits) def_fp is served at on this device: the smallest of 16/24/32
    // at which every behavior's def_fp stays distinct (SS4). The web masks its
    // bundle/cache def_fp keys to this width. 0 is treated as 16 for backward
    // compatibility.
    uint32 def_fp_bits = 11;
}

message LayerFingerprint {
    uint32 id = 1;
    string name = 2;
    uint32 binding_count = 3;
    uint32 fp = 4;
    uint32 default_fp = 5;
    uint32 edited_count = 6;
}

// enum BehaviorDetailsMode -- see DESIGN.md SS5 for the semantics of each
// mode.
enum BehaviorDetailsMode {
    BEHAVIOR_DETAILS_NONE = 0;   // slim summaries only
    BEHAVIOR_DETAILS_CUSTOM = 1; // inline details for non-standard behaviors
    BEHAVIOR_DETAILS_ALL = 2;    // inline details for every behavior
}

message ListBehaviorsRequest {
    BehaviorDetailsMode details = 1;
    // Include BehaviorDetails.alias in any inlined details. Off by default:
    // the alias is only needed to render/export a behavior's `&<alias>` token,
    // and for standard behaviors the client already has it from its bundle
    // (def_fp still hashes the true alias either way, SS4/SS5). A client that
    // doesn't render aliases leaves this false to save those bytes.
    bool include_alias = 2;
    // BehaviorDetails.display_name is included by default (opt-out): set this
    // to omit it when the client doesn't render a behavior's human name. As
    // with alias, def_fp still hashes the true display_name regardless.
    bool exclude_display_name = 3;
}

message ListBehaviorsResponse { repeated BehaviorSummary behaviors = 1; }

// Slim: on the wire this is normally just local_id + def_fp (~7-8 B; def_fp
// is truncated to 16 bits -- see SS4/docs/protocol.md); `details` is present
// only per the request's BehaviorDetailsMode (SS5).
message BehaviorSummary {
    uint32 local_id = 1;
    uint32 def_fp = 2; // content-addressed identity + validator (low 16 bits), see SS4
    BehaviorDetails details = 3;
}

// The official details tree (zmk.behaviors.GetBehaviorDetailsResponse)
// factored into a reusable submessage. Carries NO fingerprint (the client uses
// BehaviorSummary.def_fp, SS4/SS5). `display_name` is present by default and
// `alias` only when requested (see ListBehaviorsRequest.include_alias /
// exclude_display_name); an omitted field is proto3's default "". def_fp still
// hashes the true alias + display_name regardless of what is served here.
message BehaviorDetails {
    string display_name = 1;
    string alias = 2;
    repeated BehaviorBindingParametersSet metadata = 3;
}

// Miss-repair batch fetch (SS5): resolve exactly the behaviors the client
// couldn't resolve from its bundle/cache, in one round-trip.
message GetBehaviorsRequest {
    repeated uint32 behavior_ids = 1;   // .options: max_count:32 (fits RX buf)
    bool include_alias = 2;             // see ListBehaviorsRequest.include_alias
    bool exclude_display_name = 3;      // see ListBehaviorsRequest.exclude_display_name
}

message GetBehaviorsResponse { repeated BehaviorEntry behaviors = 1; }

message BehaviorEntry {
    uint32 id = 1;
    BehaviorDetails details = 2;
}

// -- The following metadata messages are copied verbatim (names, field
// numbers, shape) from zmk.behaviors so firmware and the bundled web
// standard-behavior definitions can share the exact same encoding. --

message BehaviorBindingParametersSet {
    repeated BehaviorParameterValueDescription param1 = 1;
    repeated BehaviorParameterValueDescription param2 = 2;
}

message BehaviorParameterValueDescriptionRange {
    int32 min = 1;
    int32 max = 2;
}

message BehaviorParameterNil {}
message BehaviorParameterLayerId {}
message BehaviorParameterHidUsage {
    uint32 keyboard_max = 1;
    uint32 consumer_max = 2;
}

message BehaviorParameterValueDescription {
    string name = 1;

    oneof value_type {
        BehaviorParameterNil nil = 2;
        uint32 constant = 3;
        BehaviorParameterValueDescriptionRange range = 4;
        BehaviorParameterHidUsage hid_usage = 5;
        BehaviorParameterLayerId layer_id = 6;
    }
}

// -- Keymap/layer/binding messages: same shape as zmk.keymap's, plus the
// default/edited-layer extensions. --

message BehaviorBinding {
    sint32 behavior_id = 1;
    uint32 param1 = 2;
    uint32 param2 = 3;
}

message Layer {
    uint32 id = 1;
    string name = 2;
    repeated BehaviorBinding bindings = 3;
}

message EditedBinding {
    uint32 position = 1;
    BehaviorBinding binding = 2;
}

message EditedLayer {
    uint32 id = 1;
    repeated EditedBinding bindings = 2;
}

// Positions (in the selected physical layout's binding order) whose binding has
// an unsaved, in-memory-only edit -- changed since the last save, i.e. ZMK
// core's pending bit (zmk_keymap_layer_binding_at_idx_is_pending). This reports
// only WHICH keys are unsaved, not their values: the client already holds the
// current bindings from get_layers/get_layer. Only layers with at least one
// pending position are included (a fully-saved keymap yields an empty list).
message PendingLayer {
    uint32 id = 1;
    repeated uint32 positions = 2;
}

message PendingResponse { repeated PendingLayer layers = 1; }

// enum LayoutDetailsMode -- see DESIGN.md SS6 for the semantics of each mode.
enum LayoutDetailsMode {
    LAYOUT_DETAILS_NONE = 0; // slim summaries only (no geometry)
    LAYOUT_DETAILS_ALL = 1;  // inline every layout's geometry
}

message GetPhysicalLayoutsRequest { LayoutDetailsMode details = 1; }

message GetPhysicalLayoutRequest { uint32 layout_index = 1; }

// Slim summary + on-demand geometry (DESIGN.md SS6): `keys` is populated only
// in LAYOUT_DETAILS_ALL mode (get_physical_layouts) or a single-layout fetch
// (get_physical_layout) -- omitted (empty) otherwise, so proto3 drops it for
// free on the wire.
message PhysicalLayoutsResponse {
    uint32 active_layout_index = 1;
    repeated PhysicalLayoutSummary layouts = 2;
}

message PhysicalLayoutResponse {
    uint32 index = 1;
    PhysicalLayoutSummary layout = 2; // keys always populated
}

message PhysicalLayoutSummary {
    string name = 1;
    uint32 fp = 2; // per-layout fingerprint, device-opaque (SS4/SS6)
    repeated KeyPhysicalAttrs keys = 3;

    // Almost every key on a board shares one width/height (e.g. 100x100), so
    // the firmware hoists the common size here and omits each key's
    // width/height when it matches -- a KeyPhysicalAttrs with width/height 0
    // means "use these defaults" (a real key is never 0-sized). Saves ~6 B
    // per key on a uniform board (SS6). Only populated alongside `keys`
    // (LAYOUT_DETAILS_ALL / get_physical_layout); the fp still hashes each
    // key's true width/height, so this is a pure wire encoding, not a data
    // change.
    sint32 default_width = 4;
    sint32 default_height = 5;
}

message KeyPhysicalAttrs {
    sint32 width = 1;
    sint32 height = 2;
    sint32 x = 3;
    sint32 y = 4;
    sint32 r = 5;
    sint32 rx = 6;
    sint32 ry = 7;
}
